<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI英会話練習アプリ V6</title>
    <style>
        :root {
            --bg-color: #f5f7fb;
            --panel-bg: #ffffff;
            --primary-color: #4a90e2;
            --primary-hover: #357abd;
            --mic-color: #ea4335;
            --mic-hover: #d3382c;
            --text-color: #333333;
            --border-color: #e0e0e0;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 600px;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: var(--panel-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .settings-panel {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            background: #fafafa;
        }
        .version-tag {
            text-align: center;
            font-size: 14px;
            color: var(--primary-color);
            font-weight: bold;
            margin: 0 0 15px 0;
            padding: 4px;
            background: #eef5fc;
            border-radius: 4px;
        }
        .warning-banner {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
            border-radius: 6px;
            padding: 10px;
            font-size: 13px;
            margin-bottom: 12px;
            display: none;
        }
        .input-group {
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
        }
        .input-group label {
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #666;
        }
        .input-group input, .input-group select {
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
        }
        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #666;
            margin-bottom: 10px;
        }
        .start-btn {
            width: 100%;
            padding: 10px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }
        .start-btn:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }

        .chat-timeline {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 80%;
        }
        .message.ai { align-self: flex-start; }
        .message.user { align-self: flex-end; align-items: flex-end; }

        .bubble {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 16px;
            line-height: 1.4;
            position: relative;
            white-space: pre-wrap;
        }
        .ai .bubble {
            background-color: #f0f0f0;
            color: var(--text-color);
            border-top-left-radius: 4px;
        }
        .user .bubble {
            background-color: var(--primary-color);
            color: white;
            border-top-right-radius: 4px;
        }

        .ai .error-bubble {
            background-color: #fde8e8 !important;
            color: #e53e3e !important;
            border: 1px solid #f5c6c6;
            font-size: 14px;
        }

        .loading-bubble {
            display: flex;
            gap: 6px;
            padding: 14px 18px;
            background-color: #f0f0f0;
            border-radius: 18px;
            border-top-left-radius: 4px;
            align-self: flex-start;
        }
        .dot {
            width: 8px;
            height: 8px;
            background-color: #888;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }

        .masked-text {
            filter: blur(5px);
            user-select: none;
            pointer-events: none;
        }
        .reveal-btn {
            margin-top: 5px;
            padding: 4px 8px;
            font-size: 12px;
            background: #fff;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            border-radius: 4px;
            cursor: pointer;
            align-self: flex-start;
        }

        .control-panel {
            padding: 20px;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: center;
            background: #fafafa;
        }
        .ptt-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: var(--mic-color);
            color: white;
            border: none;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(234, 67, 53, 0.4);
            user-select: none;
            transition: transform 0.1s, background-color 0.2s;
        }
        .ptt-btn:active, .ptt-btn.recording {
            background-color: var(--mic-hover);
            transform: scale(0.95);
        }
        .ptt-btn:disabled {
            background-color: #cccccc !important;
            box-shadow: none !important;
            color: #888888 !important;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .status-text {
            text-align: center;
            font-size: 12px;
            color: #888;
            margin-top: 5px;
            padding-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="settings-panel" id="settings-panel">
        <div class="version-tag">現在動作中のバージョン: V6（バグ修正版）</div>
        <div class="warning-banner" id="browser-warning">
            お使いのブラウザは音声認識(Web Speech API)に対応していません。Google Chromeでのご利用を推奨します。テキスト表示・音声読み上げのみ利用できます。
        </div>

        <div class="input-group">
            <label for="api-key">Gemini API Key</label>
            <input type="password" id="api-key" placeholder="AIza...（APIキーを入力）">
        </div>
        <div class="checkbox-row">
            <input type="checkbox" id="remember-key">
            <label for="remember-key">このブラウザにAPIキーを保存する（共有PCでは非推奨）</label>
        </div>
        <div class="input-group">
            <label for="situation">シチュエーション選択</label>
            <select id="situation">
                <option value="shopping">買い物 (At a clothing store)</option>
                <option value="business">仕事 (Business meeting / Office conversation)</option>
                <option value="greeting">初対面の挨拶 (Meeting someone for the first time)</option>
                <option value="bar">バーでたまたま会った人 (Casual chat at a bar)</option>
            </select>
        </div>
        <button class="start-btn" id="start-btn">会話を開始する</button>
    </div>

    <div class="chat-timeline" id="chat-timeline"></div>

    <div>
        <div class="control-panel">
            <button class="ptt-btn" id="ptt-btn" disabled>HOLD<br>TO TALK</button>
        </div>
        <div class="status-text" id="status-text">APIキーを入力し、会話を開始してください</div>
        <div id="debug-log" style="font-size:10px;color:#aaa;padding:0 15px 10px;max-height:80px;overflow-y:auto;font-family:monospace;white-space:pre-wrap;"></div>
    </div>
</div>

<script>
    // ===== 設定 =====
    // 2026年7月時点でGemini 1.5系は提供終了(EOL)しているため 2.5系を使用。
    // 必要に応じて gemini-2.5-flash / gemini-2.5-flash-lite などに変更してください。
    const MODEL_NAME = 'gemini-2.5-flash';
    const API_BASE = 'https://generativelanguage.googleapis.com/v1beta/models';

    let apiKey = '';
    let currentSituation = '';
    let conversationHistory = [];
    let isRecording = false;
    let recognitionActive = false; // recognition.start()〜onend/onerror の間だけtrue
    let resultReceivedThisSession = false; // このstart()〜end()の間にonresultが来たか

    const SpeechRecognitionCtor = window.SpeechRecognition || window.webkitSpeechRecognition;
    const speechSupported = !!SpeechRecognitionCtor;
    let recognition = null; // 現在のセッションで使っているインスタンス（毎回作り直す）
    let watchdogTimer = null; // iOS/Safariでイベントが一切発火しないケース用の保険タイマー

    const debugLogEl = document.getElementById('debug-log');
    function debugLog(msg) {
        const t = new Date().toLocaleTimeString('ja-JP', { hour12: false });
        console.log(`[${t}] ${msg}`);
        if (debugLogEl) {
            debugLogEl.textContent += `[${t}] ${msg}\n`;
            debugLogEl.scrollTop = debugLogEl.scrollHeight;
        }
    }
    debugLog(`SpeechRecognition対応: ${speechSupported} / UA: ${navigator.userAgent}`);
    debugLog(`secure context (https/localhost): ${window.isSecureContext}`);
    try {
        if (navigator.permissions && navigator.permissions.query) {
            navigator.permissions.query({ name: 'microphone' }).then(status => {
                debugLog(`マイク権限の状態: ${status.state}`);
            }).catch(() => debugLog('マイク権限の事前確認は非対応（Safari系では想定内）'));
        }
    } catch (e) {
        debugLog('マイク権限の事前確認は非対応（Safari系では想定内）');
    }

    // iOS(Safari系エンジン)はイベントの取りこぼしや使い回し時の不安定動作が知られているため、
    // start()のたびに新しいSpeechRecognitionインスタンスを生成する
    function createRecognition() {
        const r = new SpeechRecognitionCtor();
        r.lang = 'en-US';
        r.interimResults = false;
        r.maxAlternatives = 1;
        r.onstart = () => debugLog('onstart: 認識開始');
        r.onaudiostart = () => debugLog('onaudiostart: 音声入力の受信開始');
        r.onspeechstart = () => debugLog('onspeechstart: 発話を検出');
        r.onspeechend = () => debugLog('onspeechend: 発話終了を検出');
        r.onaudioend = () => debugLog('onaudioend: 音声入力の受信終了');
        r.onnomatch = () => debugLog('onnomatch: 認識はできたが該当なし');
        r.onresult = (e) => { debugLog(`onresult: "${e.results?.[0]?.[0]?.transcript || ''}"`); handleSpeechResult(e); };
        r.onerror = (e) => { debugLog(`onerror: ${e.error} ${e.message || ''}`); handleRecognitionError(e); };
        r.onend = () => { debugLog('onend: 認識セッション終了'); handleRecognitionEnd(); };
        return r;
    }

    const synth = window.speechSynthesis;

    const startBtn = document.getElementById('start-btn');
    const pttBtn = document.getElementById('ptt-btn');
    const apiKeyInput = document.getElementById('api-key');
    const rememberKeyCheckbox = document.getElementById('remember-key');
    const situationSelect = document.getElementById('situation');
    const chatTimeline = document.getElementById('chat-timeline');
    const statusText = document.getElementById('status-text');
    const settingsPanel = document.getElementById('settings-panel');
    const browserWarning = document.getElementById('browser-warning');

    // ブラウザが音声認識非対応の場合は、起動前にはっきり警告する
    if (!speechSupported) {
        browserWarning.style.display = 'block';
    }

    // 保存済みAPIキーがあれば復元（ローカルストレージ・任意）
    try {
        const savedKey = localStorage.getItem('gemini_api_key');
        if (savedKey) {
            apiKeyInput.value = savedKey;
            rememberKeyCheckbox.checked = true;
        }
    } catch (e) {
        // プライベートブラウジング等でlocalStorageが使えない場合は無視
    }

    startBtn.addEventListener('click', startConversation);

    if (speechSupported) {
        pttBtn.addEventListener('mousedown', onPressStart);
        pttBtn.addEventListener('mouseup', onPressEnd);
        // ボタン外でマウスを離した場合も確実に録音を止める
        pttBtn.addEventListener('mouseleave', onPressEnd);
        pttBtn.addEventListener('touchstart', (e) => { e.preventDefault(); onPressStart(); });
        pttBtn.addEventListener('touchend', (e) => { e.preventDefault(); onPressEnd(); });
        pttBtn.addEventListener('touchcancel', (e) => { e.preventDefault(); onPressEnd(); });
    }

    function clearWatchdog() {
        if (watchdogTimer) {
            clearTimeout(watchdogTimer);
            watchdogTimer = null;
        }
    }

    // 何らかの理由でUIが「処理中」等のまま固まった場合に強制復帰させる
    function forceResetRecordingUI(message) {
        clearWatchdog();
        recognitionActive = false;
        isRecording = false;
        pttBtn.classList.remove('recording');
        statusText.innerText = message;
    }

    function handleRecognitionError(e) {
        console.error(e);
        recognitionActive = false;
        isRecording = false; // ★これが無いと以後ボタンが二度と反応しなくなるバグがあった
        clearWatchdog();
        pttBtn.classList.remove('recording');

        if (e.error === 'no-speech') {
            statusText.innerText = '発話が検出されませんでした。もう一度お試しください。';
        } else if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
            statusText.innerText = 'マイクの使用が許可されていません。ブラウザの設定をご確認ください。';
        } else {
            statusText.innerText = `認識エラー: ${e.error}`;
        }
    }

    // ブラウザ側が自動でタイムアウトした場合や、発話が短すぎて
    // onresult/onerrorのどちらも発火せずに終了するケースに対応
    function handleRecognitionEnd() {
        recognitionActive = false;
        isRecording = false;
        clearWatchdog();
        pttBtn.classList.remove('recording');

        // onresultで既にgenerateAiResponse()が呼ばれている場合は何もしない
        // （ステータス文言は「AIが考え中...」等に上書き済みのため）
        if (!resultReceivedThisSession) {
            statusText.innerText = '認識できませんでした。もう一度ボタンを押して話してください。';
        }
    }

    function onPressStart() {
        if (!pttBtn.disabled) startSpeechRecognition();
    }
    function onPressEnd() {
        if (!pttBtn.disabled) stopSpeechRecognition();
    }

    async function startConversation() {
        try {
            apiKey = apiKeyInput.value.trim();

            if (!apiKey) {
                alert('Gemini APIキーを入力してください。');
                return;
            }

            // APIキー保存/削除
            try {
                if (rememberKeyCheckbox.checked) {
                    localStorage.setItem('gemini_api_key', apiKey);
                } else {
                    localStorage.removeItem('gemini_api_key');
                }
            } catch (e) { /* ignore */ }

            if (situationSelect && situationSelect.selectedIndex >= 0) {
                currentSituation = situationSelect.options[situationSelect.selectedIndex].text;
            } else {
                currentSituation = "English Conversation";
            }

            // 音声解放処理でのクラッシュを安全に回避
            try {
                if (synth) {
                    const audioUnlock = new SpeechSynthesisUtterance('');
                    synth.speak(audioUnlock);
                }
            } catch (speechErr) {
                console.warn("SpeechSynthesis unlock skipped:", speechErr);
            }

            settingsPanel.style.display = 'none';
            pttBtn.disabled = true;
            statusText.innerText = '会話を準備中...';

            conversationHistory = [
                {
                    role: 'user',
                    parts: [{ text: `You are a native English speaker. Let's practice English conversation. Situation: [ ${currentSituation} ]. Please start the conversation with 1 or 2 natural short sentences as the first turn.` }]
                }
            ];

            await generateAiResponse();
        } catch (err) {
            alert("ボタン処理内でエラーが発生しました:\n" + err.message);
            console.error(err);
        }
    }

    async function generateAiResponse() {
        statusText.innerText = 'AIが考え中...';
        pttBtn.disabled = true;

        const loadingDiv = document.createElement('div');
        loadingDiv.classList.add('message', 'ai');
        loadingDiv.innerHTML = `
            <div class="loading-bubble">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        `;
        chatTimeline.appendChild(loadingDiv);
        chatTimeline.scrollTop = chatTimeline.scrollHeight;

        const url = `${API_BASE}/${MODEL_NAME}:generateContent`;

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    // APIキーをURLクエリではなくヘッダーで送る（履歴に残らない）
                    'x-goog-api-key': apiKey
                },
                body: JSON.stringify({
                    contents: conversationHistory,
                    generationConfig: {
                        maxOutputTokens: 200,
                        temperature: 0.9
                    }
                })
            });

            loadingDiv.remove();

            if (!response.ok) {
                let errMessage = `APIエラー (Status: ${response.status})`;
                try {
                    const errData = await response.json();
                    errMessage = errData.error?.message || errMessage;
                } catch (parseErr) { /* JSONでない場合はデフォルトメッセージ */ }

                if (response.status === 404) {
                    errMessage += `\n（モデル名 "${MODEL_NAME}" が存在しないか、提供終了になっている可能性があります）`;
                } else if (response.status === 400) {
                    errMessage += '\n（APIキーが無効、または不正なリクエストの可能性があります）';
                }
                throw new Error(errMessage);
            }

            const data = await response.json();
            const candidate = data.candidates && data.candidates[0];
            const aiText = candidate?.content?.parts?.[0]?.text?.trim();

            if (aiText) {
                conversationHistory.push({
                    role: 'model',
                    parts: [{ text: aiText }]
                });

                addMessageToTimeline('ai', aiText);
                speak(aiText);

                pttBtn.disabled = !speechSupported; // 音声認識非対応ブラウザでは押せないままにする
                statusText.innerText = speechSupported
                    ? 'ボタンを押しながら話してください（英語）'
                    : 'このブラウザでは音声入力は利用できません（読み上げのみ）';
            } else if (candidate?.finishReason === 'SAFETY') {
                throw new Error('安全性の理由により応答がブロックされました。別の内容でお試しください。');
            } else {
                throw new Error('不適切なレスポンスを受け取りました。');
            }
        } catch (error) {
            if (loadingDiv) loadingDiv.remove();
            console.error(error);
            statusText.innerText = `エラーが発生しました`;
            addErrorMessageToTimeline(error.message);
            settingsPanel.style.display = 'block';
            pttBtn.disabled = true;
        }
    }

    function speak(text) {
        try {
            if (synth.speaking) {
                synth.cancel();
            }
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';

            const voices = synth.getVoices();
            const enVoice = voices.find(v => v.lang.startsWith('en-') && !v.localService) || voices.find(v => v.lang.startsWith('en-'));
            if (enVoice) utterance.voice = enVoice;

            synth.speak(utterance);
        } catch (e) {
            console.error("TTS output failed:", e);
        }
    }

    function startSpeechRecognition() {
        if (!speechSupported || isRecording || recognitionActive) return;
        debugLog('ボタン押下 → recognition.start()を呼びます');
        try {
            synth.cancel();
            isRecording = true;
            recognitionActive = true;
            resultReceivedThisSession = false;
            pttBtn.classList.add('recording');
            statusText.innerText = '発話を認識中...';

            recognition = createRecognition(); // Safari対策：毎回作り直す
            recognition.start();

            // 万一どのイベントも発火しない場合の保険（最大15秒で強制終了）
            clearWatchdog();
            watchdogTimer = setTimeout(() => {
                debugLog('⚠️ 15秒間どのイベントも発火せず（タイムアウト）');
                try { recognition && recognition.abort(); } catch (e) { /* ignore */ }
                forceResetRecordingUI('タイムアウトしました。もう一度ボタンを押して話してください。');
            }, 15000);
        } catch (e) {
            debugLog(`❌ start()で例外: ${e.name} ${e.message}`);
            statusText.innerText = `マイク起動エラー: ${e.message}`;
            pttBtn.classList.remove('recording');
            isRecording = false;
            recognitionActive = false;
        }
    }

    function stopSpeechRecognition() {
        if (!isRecording) return;
        debugLog('ボタン解放 → recognition.stop()を呼びます');
        isRecording = false;
        pttBtn.classList.remove('recording');
        statusText.innerText = '処理中...';
        try {
            recognition && recognition.stop();
        } catch (e) {
            debugLog(`❌ stop()で例外: ${e.name} ${e.message}`);
            recognitionActive = false;
        }

        // stop()を呼んでも一部ブラウザ（iOS Safari系）ではイベントが返ってこないことがあるため、
        // 短時間で応答がなければ強制的にUIを復帰させる
        clearWatchdog();
        watchdogTimer = setTimeout(() => {
            debugLog('⚠️ stop()後6秒間どのイベントも発火せず（強制リセット）');
            forceResetRecordingUI('応答がありませんでした。もう一度ボタンを押して話してください。');
        }, 6000);
    }

    async function handleSpeechResult(event) {
        const userText = event.results[0][0].transcript;
        recognitionActive = false;
        resultReceivedThisSession = true;
        clearWatchdog();
        if (!userText) return;

        addMessageToTimeline('user', userText);

        conversationHistory.push({
            role: 'user',
            parts: [{ text: userText }]
        });

        await generateAiResponse();
    }

    function addMessageToTimeline(sender, text) {
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message', sender);

        const bubble = document.createElement('div');
        bubble.classList.add('bubble');
        bubble.innerText = text;

        if (sender === 'ai') {
            bubble.classList.add('masked-text');

            const revealBtn = document.createElement('button');
            revealBtn.classList.add('reveal-btn');
            revealBtn.innerText = '英文を表示 (Show Text)';
            revealBtn.onclick = () => {
                bubble.classList.remove('masked-text');
                revealBtn.style.display = 'none';
            };

            msgDiv.appendChild(bubble);
            msgDiv.appendChild(revealBtn);
        } else {
            msgDiv.appendChild(bubble);
        }

        chatTimeline.appendChild(msgDiv);
        chatTimeline.scrollTop = chatTimeline.scrollHeight;
    }

    function addErrorMessageToTimeline(text) {
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message', 'ai');
        const bubble = document.createElement('div');
        bubble.classList.add('bubble', 'error-bubble');
        bubble.innerText = `【システムエラー】\n${text}\n\nキーの確認、またはページの再読み込みをお試しください。`;
        msgDiv.appendChild(bubble);
        chatTimeline.appendChild(msgDiv);
        chatTimeline.scrollTop = chatTimeline.scrollHeight;
    }

    if (synth && synth.onvoiceschanged !== undefined) {
        synth.onvoiceschanged = () => synth.getVoices();
    }
</script>

</body>
</html>
