<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI英会話練習アプリ</title>
    <style>
        :root {
            --bg-color: #f5f7fb;
            --panel-bg: #ffffff;
            --primary-color: #4a90e2;
            --primary-hover: #357abd;
            --mic-color: #ea4335;
            --mic-hover: #d3382c;
            --text-color: #333333;
            --border-color: #e0e0e0;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 600px;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: var(--panel-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        /* 設定エリア */
        .settings-panel {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            background: #fafafa;
        }
        .input-group {
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
        }
        .input-group label {
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #666;
        }
        .input-group input, .input-group select {
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
        }
        .start-btn {
            width: 100%;
            padding: 10px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }
        .start-btn:hover { background-color: var(--primary-hover); }

        /* チャットエリア */
        .chat-timeline {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 80%;
        }
        .message.ai { align-self: flex-start; }
        .message.user { align-self: flex-end; align-items: flex-end; }

        .bubble {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 16px;
            line-height: 1.4;
            position: relative;
        }
        .ai .bubble {
            background-color: #f0f0f0;
            color: var(--text-color);
            border-top-left-radius: 4px;
        }
        .user .bubble {
            background-color: var(--primary-color);
            color: white;
            border-top-right-radius: 4px;
        }

        /* マスク表現 */
        .masked-text {
            filter: blur(5px);
            user-select: none;
            pointer-events: none;
        }
        .reveal-btn {
            margin-top: 5px;
            padding: 4px 8px;
            font-size: 12px;
            background: #fff;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            border-radius: 4px;
            cursor: pointer;
            align-self: flex-start;
        }
        .reveal-btn:hover {
            background: var(--primary-color);
            color: #fff;
        }

        /* コントロールエリア */
        .control-panel {
            padding: 20px;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: center;
            background: #fafafa;
        }
        .ptt-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: var(--mic-color);
            color: white;
            border: none;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(234, 67, 53, 0.4);
            user-select: none;
            transition: transform 0.1s, background-color 0.2s;
        }
        .ptt-btn:active, .ptt-btn.recording {
            background-color: var(--mic-hover);
            transform: scale(0.95);
            box-shadow: 0 2px 5px rgba(234, 67, 53, 0.4);
        }
        .status-text {
            text-align: center;
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="settings-panel" id="settings-panel">
        <div class="input-group">
            <label for="api-key">Gemini API Key</label>
            <input type="password" id="api-key" placeholder="AIZA...（APIキーを入力）">
        </div>
        <div class="input-group">
            <label for="situation">シチュエーション選択</label>
            <select id="situation">
                <option value="shopping">買い物 (At a clothing store)</option>
                <option value="business">仕事 (Business meeting / Office conversation)</option>
                <option value="greeting">初対面の挨拶 (Meeting someone for the first time)</option>
                <option value="bar">バーでたまたま会った人 (Casual chat at a bar)</option>
            </select>
        </div>
        <button class="start-btn" id="start-btn">会話を開始する</button>
    </div>

    <div class="chat-timeline" id="chat-timeline">
        </div>

    <div>
        <div class="control-panel">
            <button class="ptt-btn" id="ptt-btn" disabled>HOLD<br>TO TALK</button>
        </div>
        <div class="status-text" id="status-text">APIキーを入力し、会話を開始してください</div>
    </div>
</div>

<script>
    // 状態管理
    let apiKey = '';
    let currentSituation = '';
    let conversationHistory = [];
    let isRecording = false;

    // Web Speech API の初期化
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;
    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;
    } else {
        alert('お使いのブラウザは音声認識（SpeechRecognition）に対応していません。Google Chrome等をお試しください。');
    }

    const synth = window.speechSynthesis;

    // DOM要素
    const startBtn = document.getElementById('start-btn');
    const pttBtn = document.getElementById('ptt-btn');
    const apiKeyInput = document.getElementById('api-key');
    const situationSelect = document.getElementById('situation');
    const chatTimeline = document.getElementById('chat-timeline');
    const statusText = document.getElementById('status-text');
    const settingsPanel = document.getElementById('settings-panel');

    // イベントリスナー
    startBtn.addEventListener('click', startConversation);

    // Push-to-Talk (マウス/タッチイベント)
    if (recognition) {
        pttBtn.addEventListener('mousedown', startSpeechRecognition);
        pttBtn.addEventListener('mouseup', stopSpeechRecognition);
        pttBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startSpeechRecognition(); });
        pttBtn.addEventListener('touchend', (e) => { e.preventDefault(); stopSpeechRecognition(); });

        recognition.onresult = handleSpeechResult;
        recognition.onerror = (e) => {
            console.error(e);
            statusText.innerText = `認識エラー: ${e.error}`;
            pttBtn.classList.remove('recording');
        };
    }

    // 会話開始処理
    async function startConversation() {
        apiKey = apiKeyInput.value.trim();
        currentSituation = situationSelect.options[situationSelect.selectedIndex].text;

        if (!apiKey) {
            alert('Gemini APIキーを入力してください。');
            return;
        }

        settingsPanel.style.display = 'none';
        pttBtn.disabled = false;
        statusText.innerText = '会話を準備中...';

        // 初期プロンプトの設定（システム命令の役割）
        conversationHistory = [
            {
                role: 'user',
                parts: [{ text: `You are a native English speaker. Let's practice English conversation. Situation: [ ${currentSituation} ]. Please start the conversation with 1 or 2 natural short sentences as the first turn.` }]
            }
        ];

        // AIの最初のセリフを取得
        await generateAiResponse();
    }

    // LLM（Gemini API）呼び出し
    async function generateAiResponse() {
        statusText.innerText = 'AIが考え中...';
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: conversationHistory })
            });

            const data = await response.json();
            if (data.candidates && data.candidates[0].content.parts[0].text) {
                const aiText = data.candidates[0].content.parts[0].text.trim();
                
                // 履歴に追加
                conversationHistory.push({
                    role: 'model',
                    parts: [{ text: aiText }]
                });

                // 画面に追加（デフォルトマスク）
                addMessageToTimeline('ai', aiText);
                // 音声再生
                speak(aiText);
                statusText.innerText = 'ボタンを押しながら話してください（英語）';
            } else {
                throw new Error('不適切なレスポンス構造です。');
            }
        } catch (error) {
            console.error(error);
            statusText.innerText = 'エラーが発生しました。APIキーまたはネットワークを確認してください。';
        }
    }

    // 音声合成（TTS）
    function speak(text) {
        if (synth.speaking) {
            synth.cancel();
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        
        // ネイティブに近い英語話者の声を探索
        const voices = synth.getVoices();
        const enVoice = voices.find(v => v.lang.startsWith('en-') && !v.localService) || voices.find(v => v.lang.startsWith('en-'));
        if (enVoice) utterance.voice = enVoice;

        synth.speak(utterance);
    }

    // 音声認識開始
    function startSpeechRecognition() {
        if (!recognition || isRecording) return;
        synth.cancel(); // AIの発話をストップ
        isRecording = true;
        pttBtn.classList.add('recording');
        statusText.innerText = '音声認識中... 話してください...';
        recognition.start();
    }

    // 音声認識終了
    function stopSpeechRecognition() {
        if (!recognition || !isRecording) return;
        isRecording = false;
        pttBtn.classList.remove('recording');
        statusText.innerText = '処理中...';
        recognition.stop();
    }

    // 音声認識結果の処理
    async function handleSpeechResult(event) {
        const userText = event.results[0][0].transcript;
        if (!userText) return;

        // ユーザーの発話を画面に表示
        addMessageToTimeline('user', userText);

        // 履歴に追加
        conversationHistory.push({
            role: 'user',
            parts: [{ text: userText }]
        });

        // AIの返答を生成
        await generateAiResponse();
    }

    // タイムラインへのメッセージ追加
    function addMessageToTimeline(sender, text) {
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message', sender);

        const bubble = document.createElement('div');
        bubble.classList.add('bubble');
        bubble.innerText = text;

        if (sender === 'ai') {
            // AIの場合は初期状態でマスクする
            bubble.classList.add('masked-text');
            
            const revealBtn = document.createElement('button');
            revealBtn.classList.add('reveal-btn');
            revealBtn.innerText = '英文を表示 (Show Text)';
            revealBtn.onclick = () => {
                bubble.classList.remove('masked-text');
                revealBtn.style.display = 'none';
            };

            msgDiv.appendChild(bubble);
            msgDiv.appendChild(revealBtn);
        } else {
            msgDiv.appendChild(bubble);
        }

        chatTimeline.appendChild(msgDiv);
        chatTimeline.scrollTop = chatTimeline.scrollHeight; // 最下部へスクロール
    }

    // 音声リストの読み込み待ち（ブラウザ対策）
    if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = () => synth.getVoices();
    }
</script>

</body>
</html>
